<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GENEX | إرسال طلب</title>

<link rel="stylesheet" href="./assets/styles.css?v=700">
<link rel="stylesheet" href="./assets/genex-fx.css?v=700">

<style>

.container{
width:min(1100px,92vw);
margin:auto;
}

.request-hero{
padding:120px 0 60px;
text-align:center;
}

.request-hero h1{
font-size:48px;
margin-bottom:14px;
}

.request-hero p{
max-width:700px;
margin:auto;
opacity:.8;
line-height:1.8;
}

.request-box{
margin-top:60px;
padding:40px;
border-radius:28px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
margin-bottom:6px;
font-size:14px;
opacity:.8;
}

.form-group input,
.form-group textarea,
.form-group select{

padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.15);
background:rgba(0,0,0,.25);
color:white;
font-size:14px;

}

.form-group textarea{
min-height:120px;
resize:vertical;
}

.full{
grid-column:1 / -1;
}

.submit-btn{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:14px;
background:#b41428;
color:white;
font-weight:700;
cursor:pointer;
}

@media(max-width:900px){

.form-grid{
grid-template-columns:1fr;
}

.request-hero h1{
font-size:34px;
}

}

</style>

</head>

<body data-page="request" data-music="true">

<div class="page-transition" id="pageTransition"></div>

<div id="backFxWrap"><canvas id="backFxCanvas"></canvas></div>
<div id="sceneWrap"><canvas id="webglCanvas"></canvas></div>
<div id="frontFxWrap"><canvas id="frontFxCanvas"></canvas></div>

<audio id="siteMusic" loop>
<source src="./assets/audio/fantasy-ambient.mp3" type="audio/mpeg">
</audio>

<header class="site-header">

<div class="container site-header-inner">

<a class="brand" href="./index.html">
<img src="./assets/logo.png">
<span>GENEX</span>
</a>

<nav class="desktop-nav">

<a href="./index.html">الرئيسية</a>
<a href="./services.html">الخدمات</a>
<a class="active" href="./request.html">اطلب الآن</a>
<a href="./join.html">انضم إلينا</a>
<a href="./contact.html">تواصل</a>
<a href="./about.html">عن جينكس</a>

</nav>

<div class="header-actions">

<div class="lang-switch">
<button data-lang="en">EN</button>
<button data-lang="ar" class="active">AR</button>
</div>

<button class="mobile-toggle" id="mobileToggle"></button>

</div>

</div>

<div class="container">

<nav class="mobile-nav" id="mobileNav">

<a href="./index.html">الرئيسية</a>
<a href="./services.html">الخدمات</a>
<a class="active" href="./request.html">اطلب الآن</a>
<a href="./join.html">انضم إلينا</a>
<a href="./contact.html">تواصل</a>
<a href="./about.html">عن جينكس</a>

</nav>

</div>

</header>

<main>

<section class="request-hero">

<div class="container">

<h1>أرسل طلب مشروع</h1>

<p>
إذا كنت ترغب في بناء نظام ذكاء اصطناعي أو منصة تقنية متقدمة
يمكنك إرسال تفاصيل مشروعك وسيتواصل فريق GENEX معك.
</p>

</div>

</section>

<section>

<div class="container">

<div class="request-box genex-panel tilt-card reveal-on-scroll">

<form>

<div class="form-grid">

<div class="form-group">

<label>الاسم</label>
<input type="text" placeholder="اسمك الكامل">

</div>

<div class="form-group">

<label>البريد الإلكتروني</label>
<input type="email" placeholder="email@example.com">

</div>

<div class="form-group">

<label>الشركة</label>
<input type="text" placeholder="اسم الشركة">

</div>

<div class="form-group">

<label>نوع المشروع</label>

<select>

<option>ذكاء اصطناعي</option>
<option>أتمتة</option>
<option>منصة رقمية</option>
<option>تحليل بيانات</option>

</select>

</div>

<div class="form-group full">

<label>تفاصيل المشروع</label>

<textarea placeholder="اكتب تفاصيل المشروع هنا"></textarea>

</div>

</div>

<button class="submit-btn">إرسال الطلب</button>

</form>

</div>

</div>

</section>

</main>

<footer class="footer">

<div class="container">
GENEX © 2026
</div>

</footer>

<script type="module" src="./assets/genex-fx.js?v=700"></script>

</body>
</html>
