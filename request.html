<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GENEX | طلب جديد</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <div class="grid"></div>

  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html"><span class="logo"></span><span>GENEX</span></a>

      <div class="nav-links">
        <a href="./index.html">الرئيسية</a>
        <a href="./services.html">الخدمات</a>
        <a href="./projects.html">الأعمال</a>
        <a href="./request.html">طلب جديد</a>
        <a href="./join.html">انضم</a>
        <a href="./contact.html">تواصل</a>
      </div>

      <div class="nav-cta">
        <div class="lang">
          <button id="btnAR" class="active">AR</button>
          <button id="btnEN">EN</button>
        </div>
        <a class="btn btn-ghost" href="./contact.html">تواصل</a>
      </div>
    </div>
  </nav>

  <section>
    <div class="container">
      <div class="card reveal">
        <div class="pulse"></div>
        <div style="padding:28px">
          <div class="section-title">
            <div>
              <h1>طلب أتمتة جديد</h1>
              <p>عبّئ البيانات وسيصل الطلب مباشرة لفريق GENEX.</p>
            </div>
          </div>

          <div class="form reveal">
            <form action="https://formsubmit.co/364a9cbe514c7baca4e17f4ef5214b3b" method="POST">
              <input type="hidden" name="_subject" value="GENEX | New Automation Request">
              <input type="hidden" name="_next" value="https://genex-2050era.github.io/genex-website/thankyou.html">
              <input type="hidden" name="_captcha" value="false">

              <label>اسم الشركة / الجهة</label>
              <input required name="company" placeholder="مثال: Smart Store Co." />

              <label>القطاع</label>
              <select name="sector">
                <option>Retail</option>
                <option>Private Facility</option>
                <option>Government</option>
                <option>Other</option>
              </select>

              <label>الهدف</label>
              <input name="goal" placeholder="مثال: أتمتة خدمة العملاء والموافقات" />

              <label>وصف مختصر</label>
              <textarea name="details" placeholder="اشرح العملية الحالية، المشاكل، والنتيجة المطلوبة..."></textarea>

              <div style="display:flex; gap:10px; margin-top:12px; flex-wrap:wrap">
                <button class="btn btn-primary" type="submit">إرسال الطلب</button>
                <a class="btn" href="./contact.html">بديل: تواصل مباشر</a>
              </div>
            </form>
          </div>

          <div class="footer">
            <div class="container row">
              <div>
                <b style="letter-spacing:.22em">GENEX</b>
                <div style="margin-top:6px; font-size:13px;">© <span id="year"></span> GENEX. All rights reserved.</div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

  <script src="./assets/app.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>

</div>

</div>
</nav>  
</html>
