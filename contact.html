<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GENEX | تواصل</title>

<link rel="stylesheet" href="./assets/styles.css">

</head>

<body>
<canvas id="bgCanvas"></canvas>
<div class="grid"></div>

<nav class="nav">

<div class="container nav-inner">

<!-- LOGO -->

<a class="brand" href="./index.html">
<span class="logo"></span>
<span>GENEX</span>
</a>

<!-- HAMBURGER -->

<button class="menu-toggle" id="menuToggle">
☰
</button>

<!-- NAV LINKS -->

<div class="nav-links">

<a href="./index.html" data-i18n="home">
الرئيسية
</a>

<a href="./services.html" data-i18n="services">
الخدمات
</a>

<a href="./request.html" data-i18n="request">
طلب جديد
</a>

<a href="./join.html" data-i18n="join">
انضم
</a>

<a href="./contact.html" data-i18n="contact">
تواصل
</a>

</div>

<!-- RIGHT SIDE -->

<div class="nav-cta">

<!-- LANGUAGE SWITCH -->

<div class="lang-switch">

<button data-lang="ar" class="active">
AR
</button>

<button data-lang="en">
EN
</button>

</div>

<!-- MAIN CTA -->

<a class="btn btn-primary" href="./request.html" data-i18n="ask">
ابدأ مشروعك مع GENEX
</a>

</div>

</div>

</nav>


<main class="container" style="padding-top:110px; padding-bottom:40px;">

<h1>تواصل معنا</h1>

<p style="opacity:.85">
لأي استفسار يمكنك التواصل مع فريق GENEX.
</p>

</main>


<script>
document.addEventListener("DOMContentLoaded", function () {

const toggle = document.getElementById("menuToggle");
const navLinks = document.querySelector(".nav-links");

if (toggle && navLinks) {

toggle.addEventListener("click", function () {
navLinks.classList.toggle("active");
});

navLinks.querySelectorAll("a").forEach(function (link) {
link.addEventListener("click", function () {
navLinks.classList.remove("active");
});
});

}

});
</script>

</body>
</html>
