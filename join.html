<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G E N E X | Join</title>

  <link rel="stylesheet" href="./assets/styles.css?v=9901" />
  <link rel="stylesheet" href="./assets/genex-fx.css?v=9901" />

  <style>
    :root{
      --bg:#02030a;
      --panel-1:rgba(255,255,255,.072);
      --panel-2:rgba(255,255,255,.035);
      --stroke:rgba(255,255,255,.08);
      --text:#fff;
      --muted:rgba(245,247,255,.74);
      --shadow:0 18px 44px rgba(0,0,0,.24);
      --red-1:rgba(120,16,28,.42);
      --red-2:rgba(88,10,20,.22);
      --radius-xl:30px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:#fff;
      font-family:system-ui;
      padding-top:72px;
    }

    .container{
      width:min(1100px, calc(100% - 32px));
      margin:0 auto;
    }

    /* ===== HERO ===== */
    .hero{
      padding:80px 0 30px;
    }

    .hero-box{
      padding:40px;
      border-radius:30px;
      background:linear-gradient(180deg,var(--panel-1),var(--panel-2));
      border:1px solid var(--stroke);
      text-align:center;
    }

    .hero h1{
      font-size:46px;
      margin-bottom:10px;
    }

    .hero p{
      max-width:650px;
      margin:auto;
      color:var(--muted);
      line-height:1.9;
    }

    /* ===== FORM ===== */
    .section{
      padding:30px 0;
    }

    .form-box{
      padding:34px;
      border-radius:30px;
      background:linear-gradient(180deg,var(--panel-1),var(--panel-2));
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
    }

    .form-grid{
      display:grid;
      gap:16px;
    }

    .input{
      width:100%;
      height:56px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#fff;
      padding:0 16px;
      font-size:15px;
    }

    textarea.input{
      height:140px;
      padding:14px;
      resize:none;
    }

    .btn{
      height:60px;
      border-radius:20px;
      border:none;
      background:linear-gradient(180deg,var(--red-1),var(--red-2));
      color:#fff;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
    }

    /* ===== FOOTER ===== */
    .footer{
      text-align:center;
      padding:30px 0;
      color:rgba(255,255,255,.6);
    }
  </style>
</head>

<body data-page="join" data-intro="false">

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container site-header-inner">
      <div class="header-brand">
        <img src="./assets/logo.png" class="header-logo" />
        <span class="brand-text">G E N E X</span>
      </div>
    </div>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="container">
      <div class="hero-box">
        <h1>انضم إلى G E N E X</h1>
        <p>
          إذا كنت تبحث عن بيئة تبني المستقبل فعلياً، وتعمل على أنظمة تتجاوز الحدود التقليدية،
          فأنت في المكان الصحيح.
        </p>
      </div>
    </div>
  </section>

  <!-- ===== FORM ===== -->
  <section class="section">
    <div class="container">
      <div class="form-box">
        <form class="form-grid">

          <input class="input" type="text" placeholder="الاسم الكامل" required />

          <input class="input" type="email" placeholder="البريد الإلكتروني" required />

          <input class="input" type="text" placeholder="مجالك / تخصصك" />

          <textarea class="input" placeholder="اكتب لنا لماذا تريد الانضمام..."></textarea>

          <button class="btn">إرسال الطلب</button>

        </form>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    G E N E X © 2026
  </footer>

  <script src="./assets/genex-fx.js?v=9901"></script>
  <script src="./assets/genex-engine-v2.js?v=9901"></script>

</body>
</html>
