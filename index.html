<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G E N E X</title>

<link rel="stylesheet" href="./assets/styles.css">
<link rel="stylesheet" href="./assets/genex-fx.css">

<style>

body{
  margin:0;
  background:#02030a;
  color:#fff;
  font-family:system-ui;
  padding-top:72px;
}

/* ===== HEADER ===== */
.site-header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:72px;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,0.35);
  z-index:1000;
}

.site-header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:100%;
  padding:0 16px;
}

/* ترتيب عربي */
.header-brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-logo{
  height:54px;
}

.brand-text{
  letter-spacing:7px;
  font-weight:600;
}

.header-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.lang-switch button{
  background:transparent;
  border:none;
  color:#fff;
  padding:8px 12px;
}

.mobile-toggle{
  width:48px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:4px;
}

.mobile-toggle span{
  width:20px;
  height:2px;
  background:#fff;
}

/* ===== HERO ===== */

/* 👇 هنا المسافة الجديدة المهمة */
.hero{
  padding:90px 16px 40px;
}

.hero-box{
  background:rgba(255,255,255,0.05);
  border-radius:30px;
  padding:30px;
  backdrop-filter:blur(10px);
}

.hero h1{
  font-size:34px;
  margin-bottom:10px;
}

.hero p{
  color:#ccc;
  line-height:1.8;
}

.buttons{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:14px 20px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
}

/* ===== CARD ===== */

.card{
  margin:40px 16px;
  padding:30px;
  border-radius:30px;
  background:rgba(255,255,255,0.04);
  text-align:center;
}

.card img{
  width:120px;
  margin-bottom:10px;

  /* تمركز بصري مضبوط */
  transform:translateX(14px);
}

.card h2{
  letter-spacing:10px;
}

/* ===== MOBILE MENU ===== */

.mobile-nav{
  position:fixed;
  top:90px;
  right:16px;
  left:16px;
  background:#111;
  border-radius:20px;
  padding:10px;
  display:none;
  flex-direction:column;
  gap:10px;
}

.mobile-nav.open{
  display:flex;
}

.mobile-nav a{
  padding:12px;
  text-align:center;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <div class="site-header-inner">

    <div class="header-brand">
      <img src="./assets/logo.png" class="header-logo">
      <span class="brand-text">G E N E X</span>
    </div>

    <div class="header-actions">
      <div class="lang-switch">
        <button>AR</button>
        <button>EN</button>
      </div>

      <button class="mobile-toggle" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

  </div>
</header>

<!-- MENU -->
<nav class="mobile-nav" id="menu">
  <a href="#">الرئيسية</a>
  <a href="#">الخدمات</a>
  <a href="#">عن GENEX</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-box">
    <h1>مرحباً بك في G E N E X</h1>
    <p>حيث لا نتخيل المستقبل فقط بل نبنيه.</p>

    <div class="buttons">
      <div class="btn">ابدأ مشروعك</div>
      <div class="btn">استكشف الخدمات</div>
    </div>
  </div>
</section>

<!-- CARD -->
<div class="card">
  <img src="./assets/logo.png">
  <h2>G E N E X</h2>
  <p>Sovereign AI Systems</p>
</div>

<script>

/* ===== MENU FIX ===== */
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

btn.onclick = () => {
  menu.classList.toggle("open");
};

</script>

<script src="./assets/genex-fx.js"></script>
<script src="./assets/genex-engine-v2.js"></script>

</body>
</html>
