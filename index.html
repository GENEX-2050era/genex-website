<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>G E N E X</title>

<link rel="stylesheet" href="./assets/styles.css" />
<link rel="stylesheet" href="./assets/genex-fx.css" />

<style>

/* ===== GENEX IDENTITY ===== */

:root{
  --bg:#07121a;

  --teal-1:#1f9a94;
  --teal-2:#6fd3c8;

  --red-1:#8a0f1a;
  --red-2:#ff2e3a;

  --gold-1:#c6a85a;
  --gold-2:#f0d48a;

  --glass:rgba(255,255,255,.05);
  --stroke:rgba(255,255,255,.08);
}

/* ===== BASE ===== */

body{
  margin:0;
  color:#fff;
  font-family:system-ui;

  background:
    radial-gradient(circle at 20% 20%, rgba(111,211,200,.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,46,58,.08), transparent 40%),
    var(--bg);

  padding-top:72px;
}

.container{
  width:min(1180px, calc(100% - 32px));
  margin:auto;
}

/* ===== HEADER ===== */

.site-header{
  position:fixed;
  top:0;
  width:100%;
  height:72px;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(14px);
  z-index:9999;
}

.site-header-inner{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand-text{
  letter-spacing:7px;
  font-weight:700;
}

/* ===== INTRO ===== */

.genex-intro{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,var(--red-1),#000);
  transition:.8s;
}

.genex-intro.hidden{
  opacity:0;
  pointer-events:none;
}

.intro-wordmark{
  font-size:52px;
  letter-spacing:.2em;
}

/* ===== VIDEO HERO ===== */

.video-hero{
  padding:40px 0;
}

.video-hero-box{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:24px;
  padding:24px;
  border-radius:28px;

  background:
    radial-gradient(circle at 30% 30%, rgba(111,211,200,.08), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(255,46,58,.08), transparent 40%),
    var(--glass);

  border:1px solid var(--stroke);
}

.video-wrapper video{
  width:100%;
  border-radius:20px;
}

.video-content h1{
  font-size:40px;
}

.genex-word{
  white-space:nowrap;
  letter-spacing:.25em;
  color:var(--gold-1);
}

/* ===== HERO ===== */

.hero{
  padding:30px 0;
}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.hero-copy{
  padding:28px;
  border-radius:28px;
  background:var(--glass);
}

.hero-orb{
  padding:30px;
  border-radius:28px;
  background:radial-gradient(circle,var(--teal-1),transparent);
  text-align:center;
}

/* ===== BUTTON ===== */

.btn{
  padding:14px 22px;
  border-radius:18px;
  border:1px solid var(--stroke);
}

.btn.primary{
  background:linear-gradient(180deg,var(--red-1),var(--red-2));
}

</style>
</head>
  
<body data-page="index" data-intro="true" data-music="true">

  <!-- INTRO -->
  <div class="genex-intro" id="genexIntro">
    <div class="intro-wordmark">G E N E X</div>
  </div>

  <!-- FX -->
  <div id="backFxWrap" aria-hidden="true">
    <canvas id="backFxCanvas"></canvas>
    <div class="back-vignette"></div>
  </div>

  <div id="sceneWrap" aria-hidden="true"></div>

  <div id="frontFxWrap" aria-hidden="true">
    <canvas id="frontFxCanvas"></canvas>
    <div class="front-fade"></div>
  </div>

  <audio id="siteMusic" loop preload="auto">
    <source src="./assets/audio/fantasy-ambient.mp3" type="audio/mpeg" />
  </audio>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container site-header-inner">
      <div class="brand-text">G E N E X</div>
    </div>
  </header>

  <main class="genex-page-content">

    <!-- VIDEO HERO -->
    <section class="video-hero">
      <div class="container">
        <div class="video-hero-box">

          <div class="video-content">
            <h1>
              مرحباً بك في <span class="genex-word">G E N E X</span>
            </h1>

            <p>
              حيث تبدأ أنظمة الذكاء السيادي والبنية التشغيلية المستقبلية.
            </p>

            <a class="btn primary" href="./request.html">ابدأ مشروعك</a>
          </div>

          <div class="video-wrapper">
            <video controls playsinline preload="metadata" poster="./assets/logo.png" id="heroWelcomeVideo">
              <source src="./assets/welcome.mp4" type="video/mp4" />
            </video>
          </div>

        </div>
      </div>
    </section>

    <!-- HERO CARDS -->
    <section class="hero">
      <div class="container hero-grid">

        <div class="hero-copy">
          <h2>G E N E X</h2>
          <p>Sovereign AI Systems</p>
        </div>

        <div class="hero-orb">
          <h2>أنظمة سيادية</h2>
          <p>نحو مستقبل مستقل بالكامل.</p>
        </div>

      </div>
    </section>

    <!-- STATS -->
    <section class="section">
      <div class="container">
        <div class="stat">AI Systems</div>
      </div>
    </section>

    <!-- BRAND VIDEO -->
    <section class="brand-video">
      <div class="container">
        <div class="brand-box">
          <video controls>
            <source src="./assets/welcome.mp4" type="video/mp4">
          </video>
        </div>
      </div>
    </section>
    </main>

  <!-- FOOTER -->
  <footer style="text-align:center;padding:30px 0;color:#aaa;">
    G E N E X © 2026
  </footer>

  <!-- MENU SCRIPT (احتياطي) -->
  <script>
    function toggleGXMenu(){}
  </script>

  <!-- INTRO SCRIPT (الإعداد الصحيح اللي طلبته) -->
  <script>
    (function () {
      function hideIntro() {
        var intro = document.getElementById("genexIntro");
        if (!intro) return;

        intro.classList.add("hidden");

        setTimeout(function () {
          intro.style.display = "none";
        }, 800);
      }

      // يختفي بعد التحميل
      window.addEventListener("load", function () {
        setTimeout(hideIntro, 2200);
      });

      // يختفي عند الضغط
      document.addEventListener("DOMContentLoaded", function () {
        var intro = document.getElementById("genexIntro");
        if (intro) {
          intro.addEventListener("click", hideIntro, { once: true });
        }
      });

      // fallback احتياطي
      setTimeout(hideIntro, 3500);
    })();
  </script>

  <!-- VIDEO FIX (تشغيل صوت الفيديو) -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const v = document.getElementById("heroWelcomeVideo");
      if (!v) return;

      v.muted = false;
      v.volume = 1;

      v.addEventListener("click", () => {
        v.muted = false;
        v.play();
      });
    });
  </script>

  <!-- FX -->
  <script src="./assets/genex-fx.js"></script>
  <script src="./assets/genex-engine-v2.js"></script>

</body>
</html>
