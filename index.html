<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GENEX</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./assets/styles.css?v=3001" />
  <link rel="stylesheet" href="./assets/genex-fx.css?v=3001" />
</head>

<body>

<!-- ===== BACKGROUND ENGINE ===== -->
<div id="backFxWrap"><canvas id="backFxCanvas"></canvas></div>
<div id="frontFxWrap"><canvas id="frontFxCanvas"></canvas></div>

<!-- ===== INTRO ===== -->
<div id="genexIntro" style="
position:fixed;
inset:0;
z-index:9999;
background:#05070d;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
transition:opacity .6s ease;
">

  <img src="./assets/logo.png" style="width:140px;margin-bottom:14px;" />

  <h1 style="
    margin:0;
    font-size:28px;
    letter-spacing:.25em;
    font-weight:900;
  ">
    GENEX
  </h1>

</div>

<!-- ===== HEADER ===== -->
<header class="site-header">
  <div class="container site-header-inner">

    <div class="brand">
      <img src="./assets/logo.png" />
      <span>GENEX</span>
    </div>

    <nav class="desktop-nav">
      <a href="./index.html" class="active">الرئيسية</a>
      <a href="./services.html">الخدمات</a>
      <a href="./join.html">انضم</a>
      <a href="./contact.html">تواصل</a>
      <a href="./about.html" data-nav-about>عن جينكس</a>
    </nav>

    <div class="header-actions">

      <div class="lang-switch">
        <button data-lang="ar" class="active">AR</button>
        <button data-lang="en">EN</button>
      </div>

      <button class="mobile-toggle" id="mobileToggle">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </button>

    </div>

  </div>

  <div class="container">
    <div class="mobile-nav" id="mobileNav">
      <a href="./index.html">الرئيسية</a>
      <a href="./services.html">الخدمات</a>
      <a href="./join.html">انضم</a>
      <a href="./contact.html">تواصل</a>
      <a href="./about.html" data-nav-about>عن جينكس</a>
    </div>
  </div>

</header>

<!-- ===== CONTENT ===== -->
<main class="genex-page-content" style="padding-top:120px">

  <section class="section">
    <div class="container">

      <div class="genex-panel" style="padding:40px;text-align:center">

        <h1 style="font-size:36px;margin-bottom:10px">
          مرحبا بك في GENEX
        </h1>

        <p style="opacity:.7;font-size:16px">
          حيث لا نتخيل المستقبل فقط بل نبنيه
        </p>

      </div>

    </div>
  </section>

</main>

<footer class="footer">
  GENEX © 2026
</footer>

<!-- ===== TRANSLATION ===== -->
<script>
(function () {

  const translations = {
    ar: {
      title: "GENEX",
    },
    en: {
      title: "GENEX",
    }
  };

  function applyLanguage(lang) {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
    localStorage.setItem("genex_lang", lang);

    document.querySelectorAll("[data-nav-about]").forEach((el)=>{
      el.textContent = lang === "ar" ? "عن جينكس" : "About GENEX";
    });
  }

  document.querySelectorAll(".lang-switch button").forEach((btn)=>{
    btn.addEventListener("click", ()=>{
      applyLanguage(btn.dataset.lang);
    });
  });

  applyLanguage(localStorage.getItem("genex_lang") || "ar");

  window.applyGENEXLanguage = applyLanguage;

})();
</script>

<!-- ===== MAIN ENGINE ===== -->
<script src="./assets/genex-fx.js?v=3001"></script>
<script src="./assets/genex-engine-v2.js?v=3001"></script>

<!-- ===== INTRO FIX ===== -->
<script>
window.addEventListener("load", function () {
  const intro = document.getElementById("genexIntro");

  setTimeout(()=>{
    intro.style.opacity = "0";
  }, 1800);

  setTimeout(()=>{
    intro.style.display = "none";
  }, 2600);
});
</script>

</body>
</html>
