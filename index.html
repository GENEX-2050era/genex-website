<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G E N E X</title>

<link rel="stylesheet" href="./assets/styles.css">
<link rel="stylesheet" href="./assets/genex-fx.css">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  background:#02030a;
  color:#fff;
  font-family:system-ui;
  padding-top:72px;
  overflow-x:hidden;
}

/* ===== HEADER ===== */
.site-header{
  position:fixed;
  top:0;
  right:0;
  left:0;
  height:72px;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,0.35);
  z-index:1000;
}

.site-header-inner{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}

.header-brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.header-logo{
  height:54px;
}

.brand-text{
  letter-spacing:7px;
  font-weight:600;
}

/* ===== ACTIONS ===== */
.header-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.lang-switch{
  display:flex;
  background:rgba(255,255,255,.05);
  border-radius:16px;
  padding:4px;
}

.lang-switch button{
  border:none;
  background:transparent;
  color:#fff;
  padding:8px 14px;
  border-radius:12px;
}

.mobile-toggle{
  width:48px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:4px;
  border:none;
}

.mobile-toggle span{
  width:20px;
  height:2px;
  background:#fff;
}

/* ===== HERO (المهم هنا 👇) ===== */
.hero{
  padding:72px 16px 40px;
}

.hero-box{
  background:rgba(255,255,255,0.05);
  border-radius:30px;
  padding:32px;
  backdrop-filter:blur(10px);
  text-align:right;
}

.hero h1{
  font-size:34px;
  margin-bottom:10px;
}

.hero p{
  color:#ccc;
  line-height:1.8;
}

.hero-actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:14px 22px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.1);
}

/* ===== CARD ===== */
.card{
  margin:40px 16px;
  padding:32px;
  border-radius:30px;
  background:rgba(255,255,255,0.04);
  text-align:center;
}

.card img{
  width:120px;
  margin-bottom:10px;
  transform:translateX(6px); /* تمركز دقيق */
}

.card h2{
  letter-spacing:10px;
}

/* ===== MOBILE NAV ===== */
.mobile-nav{
  position:fixed;
  top:90px;
  right:16px;
  left:16px;
  background:rgba(10,12,20,.95);
  border-radius:20px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  opacity:0;
  visibility:hidden;
  transform:translateY(-10px);
  transition:.25s;
  z-index:999;
}

.mobile-nav.open{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}

.mobile-nav a{
  padding:14px;
  text-align:center;
  border-radius:14px;
  background:rgba(255,255,255,.05);
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .hero{
    padding:48px 16px 40px;
  }

  .card img{
    transform:translateX(4px);
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <div class="site-header-inner">

    <div class="header-brand">
      <img src="./assets/logo.png" class="header-logo">
      <span class="brand-text">G E N E X</span>
    </div>

    <div class="header-actions">
      <div class="lang-switch">
        <button>AR</button>
        <button>EN</button>
      </div>

      <button class="mobile-toggle" id="mobileToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

  </div>
</header>

<!-- MENU -->
<nav class="mobile-nav" id="mobileNav">
  <a href="./index.html">الرئيسية</a>
  <a href="./services.html">الخدمات</a>
  <a href="./request.html">ابدأ مشروعك</a>
  <a href="./about.html">عن G E N E X</a>
</nav>

<!-- BACKGROUND (Engine) -->
<div id="backFxWrap"><canvas id="backFxCanvas"></canvas></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-box">
    <h1>مرحباً بك في G E N E X</h1>
    <p>حيث لا نتخيل المستقبل فقط بل نبنيه.</p>

    <div class="hero-actions">
      <div class="btn">ابدأ مشروعك</div>
      <div class="btn">استكشف الخدمات</div>
    </div>
  </div>
</section>

<!-- CARD -->
<div class="card">
  <img src="./assets/logo.png">
  <h2>G E N E X</h2>
  <p>Sovereign AI Systems</p>
</div>

<script>

/* MENU FIX */
const toggle = document.getElementById("mobileToggle");
const nav = document.getElementById("mobileNav");

toggle.onclick = () => {
  nav.classList.toggle("open");
};

document.addEventListener("click",(e)=>{
  if(!nav.contains(e.target) && !toggle.contains(e.target)){
    nav.classList.remove("open");
  }
});

</script>

<script src="./assets/genex-fx.js"></script>
<script src="./assets/genex-engine-v2.js"></script>

</body>
</html>
