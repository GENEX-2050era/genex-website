<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G E N E X | Sovereign Intelligence Systems</title>

<link rel="stylesheet" href="./assets/styles.css?v=9901">
<link rel="stylesheet" href="./assets/genex-fx.css?v=9901">

<style>

/* ============================= */
/* BASE */
/* ============================= */

body{
  margin:0;
  background:#02030a;
  color:#fff;
  font-family:system-ui;
}

/* ============================= */
/* INTRO MASTER */
/* ============================= */

:root{
  --intro-shift-y:-6%;
  --intro-wrap:760px;
  --intro-logo:560px;
  --intro-glow:420px;
  --intro-word-size:54px;
  --intro-word-spacing:.18em;
  --intro-word-margin:-26px;
}

.genex-intro{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#05060d;
}

.intro-core{
  text-align:center;
  transform:translateY(var(--intro-shift-y));
}

.intro-logo-wrap{
  width:var(--intro-wrap);
  height:var(--intro-wrap);
  display:flex;
  align-items:center;
  justify-content:center;
}

.intro-logo{
  width:var(--intro-logo);
}

.intro-wordmark{
  font-size:var(--intro-word-size);
  letter-spacing:var(--intro-word-spacing);
  margin:var(--intro-word-margin) 0 0;
  white-space:nowrap;
}

/* ============================= */
/* HERO */
/* ============================= */

.hero{
  padding:120px 20px;
}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

.hero-actions{
  display:flex;
  gap:12px;
}

.btn{
  padding:14px 20px;
  border-radius:14px;
  background:#111;
  border:1px solid #333;
}

/* ============================= */
/* HERO ORB MASTER */
/* ============================= */

.hero-orb{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-orb-lockup{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.hero-orb-logo-wrap{
  width:136px;
  height:136px;
  margin-bottom:14px;
}

.hero-orb-logo-wrap img{
  width:100%;
}

.hero-orb-wordmark{
  font-size:34px;
  letter-spacing:.16em;
  white-space:nowrap;
}

.hero-orb-badge{
  margin-top:6px;
  opacity:.7;
}
/* ===== FIX GENEX BREAK ===== */

.hero,
.hero-grid,
.hero-copy,
.hero-visual{
  direction: rtl;
}

/* نخلي الكرت الثاني LTR */
.hero-orb{
  direction: ltr !important;
}

/* كلمة G E N E X */
.hero-orb-wordmark{
  direction: ltr !important;
  unicode-bidi: isolate;
  white-space: nowrap !important;
  display: inline-block;
}

/* العنوان الرئيسي */
.hero h1{
  white-space: normal !important;
}

/* منع انكسار GENEX داخل العنوان */
.hero h1 span,
.hero h1{
  word-break: keep-all;
}
  /* ===== GENEX INLINE FIX ===== */

.genex-inline{
  direction:ltr !important;
  unicode-bidi:isolate;
  white-space:nowrap;
  display:inline-block;
  letter-spacing:.16em;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="genex-intro" id="intro">
  <div class="intro-core">
    <div class="intro-logo-wrap">
      <img src="./assets/logo.png" class="intro-logo">
    </div>
    <div class="intro-wordmark">G E N E X</div>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-grid">

    <div>
      <h1 data-i18n="hero_title">
  مرحباً بك في <span class="genex-inline">G E N E X</span>
</h1>

      <div class="hero-actions">
        <a class="btn">ابدأ مشروعك</a>
        <a class="btn">الخدمات</a>
      </div>
    </div>

    <!-- HERO ORB -->
    <div class="hero-orb">

      <div class="hero-orb-lockup">
        <div class="hero-orb-logo-wrap">
          <img src="./assets/logo.png">
        </div>

        <div class="hero-orb-wordmark">G E N E X</div>
      </div>

      <div class="hero-orb-badge">
        Sovereign AI Systems<br>
        Autonomous Infrastructure
      </div>

    </div>

  </div>
</section>

<script>

/* INTRO */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
  },2000);
});

</script>

<script src="./assets/genex-fx.js"></script>

</body>
</html>
