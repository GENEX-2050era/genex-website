<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>G E N E X | Sovereign Intelligence Systems</title>

<link rel="stylesheet" href="./assets/styles.css" />
<link rel="stylesheet" href="./assets/genex-fx.css" />

<style>

/* ===== GENEX NEW IDENTITY ===== */

:root{
  --bg:#03040b;
  --text:#ffffff;

  /* الهوية الجديدة */
  --primary:#5b0a14;
  --primary-soft:#8b0f1d;
  --accent:#d6b36a;
  --accent-soft:#f2d89a;

  --glass:rgba(255,255,255,.05);
  --stroke:rgba(255,255,255,.08);
  --radius:28px;
}

/* ===== BASE ===== */

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  padding-top:72px;
}

.container{
  width:min(1180px, calc(100% - 32px));
  margin:auto;
}

/* ===== HEADER ===== */

.site-header{
  position:fixed;
  top:0;
  width:100%;
  height:72px;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(14px);
  z-index:9999;
}

.site-header-inner{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand-text{
  letter-spacing:7px;
  font-weight:700;
}

/* ===== INTRO ===== */

.genex-intro{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,var(--primary),#000);
  transition:.8s;
}

.genex-intro.hidden{
  opacity:0;
  pointer-events:none;
}

.intro-wordmark{
  font-size:52px;
  letter-spacing:.2em;
}

/* ===== HERO VIDEO ===== */

.video-hero{
  padding:40px 0;
}

.video-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  padding:24px;
  border-radius:var(--radius);
  background:linear-gradient(180deg,var(--glass),transparent);
  border:1px solid var(--stroke);
}

.video-wrapper video{
  width:100%;
  border-radius:20px;
}

.video-content h1{
  font-size:42px;
}

.genex-word{
  letter-spacing:.2em;
  color:var(--accent);
}

/* ===== HERO CARD ===== */

.hero{
  padding:30px 0;
}

.hero-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.hero-copy{
  padding:28px;
  border-radius:var(--radius);
  background:linear-gradient(180deg,var(--glass),transparent);
}

.hero-orb{
  padding:30px;
  border-radius:var(--radius);
  background:radial-gradient(circle,var(--primary-soft),transparent);
  text-align:center;
}

/* ===== BUTTON ===== */

.btn{
  padding:14px 22px;
  border-radius:18px;
  border:1px solid var(--stroke);
}

.btn.primary{
  background:linear-gradient(180deg,var(--primary),var(--primary-soft));
}

/* ===== SECTION ===== */

.section{
  padding:40px 0;
}

.stat{
  padding:20px;
  border-radius:20px;
  background:var(--glass);
}

/* ===== BRAND VIDEO ===== */

.brand-video{
  padding:40px 0;
}

.brand-box{
  padding:20px;
  border-radius:var(--radius);
  background:var(--glass);
}

.brand-box video{
  width:100%;
  border-radius:20px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="genex-intro" id="genexIntro">
  <div class="intro-wordmark">G E N E X</div>
</div>

<header class="site-header">
  <div class="container site-header-inner">
    <div class="brand-text">G E N E X</div>
  </div>
</header>

<main>

<!-- HERO VIDEO -->
<section class="video-hero">
  <div class="container">
    <div class="video-box">

      <div class="video-wrapper">
        <video controls playsinline>
          <source src="./assets/welcome.mp4" type="video/mp4">
        </video>
      </div>

      <div class="video-content">
        <h1>
          مرحباً بك في <span class="genex-word">G E N E X</span>
        </h1>
        <p>
          حيث تبدأ أنظمة الذكاء السيادي والبنية التشغيلية المستقبلية.
        </p>

        <a class="btn primary" href="./request.html">ابدأ مشروعك</a>
      </div>

    </div>
  </div>
</section>

<!-- HERO -->
<section class="hero">
  <div class="container hero-grid">

    <div class="hero-copy">
      <h2>أنظمة سيادية</h2>
      <p>نحو مستقبل مستقل بالكامل.</p>
    </div>

    <div class="hero-orb">
      <h2>G E N E X</h2>
      <p>Sovereign AI Systems</p>
    </div>

  </div>
</section>

<!-- STATS -->
<section class="section">
  <div class="container">
    <div class="stat">AI Systems</div>
  </div>
</section>

<!-- BRAND VIDEO -->
<section class="brand-video">
  <div class="container">
    <div class="brand-box">
      <video controls>
        <source src="./assets/welcome.mp4" type="video/mp4">
      </video>
    </div>
  </div>
</section>

</main>

<footer style="text-align:center;padding:30px">
G E N E X © 2026
</footer>

<!-- INTRO SCRIPT (مضبوط) -->
<script>
(function(){
  const intro = document.getElementById("genexIntro");

  function hideIntro(){
    if(!intro) return;
    intro.classList.add("hidden");
    setTimeout(()=> intro.remove(),800);
  }

  window.addEventListener("load",()=>{
    setTimeout(hideIntro,2000);
  });

  intro.addEventListener("click",hideIntro);
})();
</script>

</body>
</html>
