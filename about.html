<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>عن GENEX | Immersive AI Experience</title>
  <meta name="description" content="GENEX builds autonomous AI systems, intelligent automation platforms, and future digital infrastructure." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://genex-era.com/about.html" />
  <meta property="og:title" content="GENEX | Immersive AI Experience" />
  <meta property="og:description" content="Autonomous AI Systems • Intelligent Automation • Future Infrastructure" />
  <meta property="og:url" content="https://genex-era.com/about.html" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://genex-era.com/assets/logo.png" />

  <link rel="stylesheet" href="./assets/styles.css?v=80" />

  <style>
    :root{
      --bg:#05070f;
      --bg2:#090d18;
      --panel:rgba(255,255,255,.05);
      --panel-2:rgba(255,255,255,.03);
      --stroke:rgba(255,255,255,.10);
      --text:#f5f7ff;
      --muted:rgba(245,247,255,.70);
      --red:#b41428;
      --red-soft:rgba(180,20,40,.38);
      --red-faint:rgba(180,20,40,.16);
      --white-soft:rgba(255,255,255,.18);
      --shadow:0 25px 80px rgba(0,0,0,.36);
      --max:1200px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      scroll-behavior:smooth;
    }

    body{
      overflow-x:hidden;
      perspective:1400px;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    /* background */
    .stage-bg{
      position:fixed;
      inset:0;
      z-index:0;
      overflow:hidden;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 14%, rgba(180,20,40,.10), transparent 26%),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.04), transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(180,20,40,.08), transparent 28%),
        linear-gradient(180deg,#04060d 0%, #090d18 100%);
    }

    .aurora{
      position:absolute;
      inset:-10%;
      filter:blur(60px);
      opacity:.95;
      transform:translate3d(0,0,0);
      will-change:transform;
    }

    .aurora.a1{
      background:
        radial-gradient(circle at 24% 30%, rgba(180,20,40,.42), transparent 18%),
        radial-gradient(circle at 55% 45%, rgba(255,255,255,.10), transparent 12%),
        radial-gradient(circle at 70% 20%, rgba(130,10,28,.30), transparent 16%);
    }

    .aurora.a2{
      background:
        radial-gradient(circle at 68% 52%, rgba(255,255,255,.08), transparent 12%),
        radial-gradient(circle at 42% 76%, rgba(180,20,40,.20), transparent 18%),
        radial-gradient(circle at 82% 74%, rgba(110,5,22,.24), transparent 14%);
      mix-blend-mode:screen;
      opacity:.72;
    }

    .grain{
      position:absolute;
      inset:0;
      opacity:.06;
      background-image:
        radial-gradient(rgba(255,255,255,.7) 0.55px, transparent 0.55px);
      background-size:18px 18px;
      mix-blend-mode:soft-light;
    }

    .beam{
      position:absolute;
      left:50%;
      top:-25%;
      width:60vw;
      height:120vh;
      transform:translateX(-50%);
      background:radial-gradient(ellipse at center, rgba(255,255,255,.08), rgba(180,20,40,.04), transparent 70%);
      filter:blur(30px);
      opacity:.6;
    }

    /* transition */
    .page-transition{
      position:fixed;
      inset:0;
      z-index:9999;
      pointer-events:none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.07), rgba(180,20,40,.09), rgba(5,7,15,.98) 70%);
      opacity:0;
      transform:scale(1.02);
      transition:opacity .45s ease, transform .65s ease;
    }

    .page-transition.active{
      opacity:1;
      transform:scale(1);
      pointer-events:auto;
    }

    /* intro */
    .intro{
      position:fixed;
      inset:0;
      z-index:9000;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.03), transparent 20%),
        radial-gradient(circle at center, rgba(180,20,40,.10), transparent 42%),
        linear-gradient(180deg, rgba(5,7,15,.985), rgba(9,13,24,.985));
      transition:opacity .9s ease, visibility .9s ease;
      overflow:hidden;
    }

    .intro.hidden{
      opacity:0;
      visibility:hidden;
    }

    .intro-core{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
      text-align:center;
      z-index:2;
    }

    .intro-logo-wrap{
      position:relative;
      width:180px;
      height:180px;
      display:grid;
      place-items:center;
    }

    .intro-logo-wrap::before,
    .intro-logo-wrap::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
    }

    .intro-logo-wrap::before{
      inset:-18%;
      background:radial-gradient(circle, rgba(255,255,255,.12), rgba(180,20,40,.16), transparent 70%);
      filter:blur(18px);
      animation:introGlow 3.2s ease-in-out infinite;
    }

    .intro-logo-wrap::after{
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 0 44px rgba(180,20,40,.10);
      animation:introRing 2.8s ease-out infinite;
    }

    @keyframes introGlow{
      0%,100%{ transform:scale(.94); opacity:.8; }
      50%{ transform:scale(1.08); opacity:1; }
    }

    @keyframes introRing{
      0%{ transform:scale(.62); opacity:0; }
      35%{ opacity:.72; }
      100%{ transform:scale(1.5); opacity:0; }
    }

    .intro-logo{
      width:108px;
      height:108px;
      object-fit:contain;
      filter:drop-shadow(0 0 18px rgba(255,255,255,.20));
      position:relative;
      z-index:2;
    }

    .intro-word{
      font-size:clamp(38px, 6vw, 76px);
      font-weight:900;
      letter-spacing:.34em;
      margin-inline-start:.34em;
    }

    .intro-sub{
      color:var(--muted);
      letter-spacing:.16em;
      font-size:15px;
    }

    /* layout */
    .shell{
      position:relative;
      z-index:1;
    }

    .container{
      width:min(var(--max), 92vw);
      margin:auto;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:100;
      backdrop-filter:blur(16px);
      background:rgba(7,9,16,.46);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .topbar-inner{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
      letter-spacing:.18em;
      white-space:nowrap;
    }

    .brand-logo{
      width:44px;
      height:44px;
      object-fit:contain;
      filter:drop-shadow(0 0 14px rgba(255,255,255,.22));
    }

    .topbar-actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:nowrap;
    }

    .lang-switch{
      display:flex;
      gap:6px;
      padding:4px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(12px);
    }

    .lang-switch button{
      border:none;
      background:transparent;
      color:#fff;
      padding:8px 12px;
      border-radius:12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .lang-switch button.active{
      background:rgba(255,255,255,.14);
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:150px;
      padding:12px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-weight:800;
      white-space:nowrap;
      backdrop-filter:blur(12px);
      box-shadow:0 10px 28px rgba(0,0,0,.18);
      transition:transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .back-btn:hover
